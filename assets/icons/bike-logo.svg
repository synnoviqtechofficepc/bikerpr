<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none" role="img" aria-label="VeloWorks Bike Shop Logo">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
  </defs>

  <!-- Rear Wheel -->
  <circle cx="22" cy="40" r="16" stroke="url(#logoGrad)" stroke-width="2.8" fill="none"/>
  <circle cx="22" cy="40" r="4" fill="#16A34A"/>
  <!-- Rear Spokes -->
  <line x1="22" y1="24" x2="22" y2="56" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="6"  y1="40" x2="38" y2="40" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="10.7" y1="28.7" x2="33.3" y2="51.3" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="10.7" y1="51.3" x2="33.3" y2="28.7" stroke="#16A34A" stroke-width="1.4"/>

  <!-- Bicycle Frame -->
  <!-- Chain stay -->
  <line x1="22" y1="40" x2="52" y2="40" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Seat tube -->
  <line x1="52" y1="40" x2="50" y2="22" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Top tube -->
  <line x1="50" y1="22" x2="64" y2="22" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Down tube -->
  <line x1="64" y1="22" x2="52" y2="40" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Fork -->
  <line x1="64" y1="22" x2="72" y2="40" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Seat post -->
  <line x1="46" y1="22" x2="55" y2="22" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Seat -->
  <path d="M44 20 Q50 17 56 20" stroke="#16A34A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Handlebar stem -->
  <line x1="64" y1="22" x2="68" y2="15" stroke="#16A34A" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Handlebar -->
  <path d="M64 14 Q68 12 72 14" stroke="#16A34A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- Pedal crank -->
  <circle cx="52" cy="40" r="4.5" fill="none" stroke="#16A34A" stroke-width="1.8"/>
  <line x1="48" y1="43" x2="44" y2="46" stroke="#16A34A" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="37" x2="60" y2="34" stroke="#16A34A" stroke-width="2" stroke-linecap="round"/>

  <!-- Front Wheel -->
  <circle cx="72" cy="40" r="16" stroke="url(#logoGrad)" stroke-width="2.8" fill="none"/>
  <circle cx="72" cy="40" r="4" fill="#16A34A"/>
  <!-- Front Spokes -->
  <line x1="72" y1="24" x2="72" y2="56" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="56" y1="40" x2="88" y2="40" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="60.7" y1="28.7" x2="83.3" y2="51.3" stroke="#16A34A" stroke-width="1.4"/>
  <line x1="60.7" y1="51.3" x2="83.3" y2="28.7" stroke="#16A34A" stroke-width="1.4"/>

  <!-- Brand Name -->
  <text x="102" y="36" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#0F172A" letter-spacing="-0.5">VeloWorks</text>
  <text x="103" y="52" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9.5" font-weight="500" fill="#16A34A" letter-spacing="3.5">BIKE SHOP</text>

  <!-- Accent dot -->
  <circle cx="99" cy="35" r="3" fill="#F97316"/>
</svg>
